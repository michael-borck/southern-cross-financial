      knowledge_additions:
        - "Financial services marketing compliance"
        - "Digital client acquisition"
        - "CRM systems and marketing automation"
        - "Content marketing for professional services"
      opinions:
        - "Our website looks like 2015 — that's the first thing prospects see"
        - "Younger clients expect app-level experiences from their financial adviser"
        - "Every marketing piece needs compliance sign-off — it slows everything"
        - "The firm's story is compelling — we just need to tell it better"
      scenario_perspective: |
        Advocating for a client portal and modern digital presence.
        Frustrated by the pace of change and the compliance hurdles
